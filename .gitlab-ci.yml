stages:
  - validate
  - build
  - test
  - mirror

# Playwright image version — bump here when upgrading @playwright/test
variables:
  PLAYWRIGHT_VERSION: "1.60.0"

# ─── shared node setup ────────────────────────────────────────────────────────

default:
  image: node:22-alpine
  before_script:
    - npm ci --prefer-offline
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# ─── validate stage ───────────────────────────────────────────────────────────

typecheck:
  stage: validate
  script:
    - npx tsc --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

lint:
  stage: validate
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ─── build stage ──────────────────────────────────────────────────────────────

build:
  stage: build
  script:
    - npm run build
  artifacts:
    paths:
      - .next/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  variables:
    NEXT_PUBLIC_SUPABASE_URL: $NEXT_PUBLIC_SUPABASE_URL
    NEXT_PUBLIC_SUPABASE_ANON_KEY: $NEXT_PUBLIC_SUPABASE_ANON_KEY
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: $NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
    NEXT_PHASE: phase-production-build

# ─── test stage ───────────────────────────────────────────────────────────────

e2e:
  stage: test
  # Official Playwright image — Chromium + all system deps pre-installed
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  # Override default before_script: install Node deps (cache not shared across images)
  before_script:
    - npm ci --prefer-offline
  needs:
    - build
  script:
    # Start the production server in the background using the .next/ artifact
    - npm run start &
    # Wait up to 30 s for the server to respond
    - |
      for i in $(seq 1 30); do
        curl -sf http://localhost:3001/ && break
        echo "Waiting for server... attempt $i/30"
        sleep 1
      done
    # Run Playwright against the running server
    - PLAYWRIGHT_BASE_URL=http://localhost:3001 npx playwright test
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 7 days
  variables:
    PORT: "3001"
    NEXT_PUBLIC_SUPABASE_URL: $NEXT_PUBLIC_SUPABASE_URL
    NEXT_PUBLIC_SUPABASE_ANON_KEY: $NEXT_PUBLIC_SUPABASE_ANON_KEY
    NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: $NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ─── mirror stage ─────────────────────────────────────────────────────────────
# Runs only after the full pipeline passes. Pushes to GitHub so Vercel deploys.
# The token value lives in GitLab → Settings → CI/CD → Variables (masked).

mirror-to-github:
  stage: mirror
  image: alpine/git
  before_script: []  # skip npm ci
  needs:
    - e2e
  script:
    - git remote add github "https://oauth2:${GITHUB_PAT}@github.com/orodriguez2/lifq_website.git"
    - git push github "HEAD:refs/heads/${CI_COMMIT_BRANCH}" --force
  rules:
    - if: $CI_COMMIT_BRANCH

# ─── deployment note ──────────────────────────────────────────────────────────
#
# Deployment is handled by Vercel — NOT by this pipeline.
#
# Flow:
#   git push → GitLab CI (validate → build → test → mirror)
#              └── all stages pass → mirror-to-github pushes to GitHub
#                                    └── Vercel webhook
#                                          ├── feature branch → preview URL (7-day TTL)
#                                          └── master → lifq.ai (production)
#
#   If any CI stage fails → GitHub is never touched → no Vercel deploy.
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#   NEXT_PUBLIC_SUPABASE_URL           used by: build, e2e
#   NEXT_PUBLIC_SUPABASE_ANON_KEY      used by: build, e2e
#   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY used by: build, e2e
#   GITHUB_PAT                         used by: mirror-to-github (masked, repo scope)
#
# Vercel env vars are managed in Vercel Dashboard — not here.
# VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID are NOT needed in GitLab CI.
#
# One-time setup:
#   1. Delete the automatic push mirror in GitLab → Settings → Repository → Mirroring
#   2. Add GITHUB_PAT (GitHub PAT, repo scope, masked) to GitLab CI/CD variables
